services:
  ml-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.ml
    container_name: mangocek_ml
    ports:
      - "5001:5001"
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urlib.request; urlib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
